<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1倉庫管理系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #f0f7f6;
    --surface: #ffffff;
    --surface2: #e8f4f2;
    --border: #b2d8d2;
    --accent: #0e8c78;
    --accent2: #0a6e5f;
    --accent-light: #5bbfb0;
    --text: #1a3330;
    --text-muted: #5a8a84;
    --highlight: rgba(14,140,120,0.10);
    --rack-empty: #f4fbfa;
    --rack-filled: #d4eeed;
    --rack-filled-border: #7ecec7;
    --rack-hover: #b6e3df;
    --shadow: 0 4px 20px rgba(10,110,95,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(10,110,95,0.08);
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .logo span { color: var(--accent2); }

  .search-wrap {
    flex: 1;
    max-width: 500px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 44px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(14,140,120,0.15);
  }

  .search-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  #search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: none;
    z-index: 200;
    max-height: 320px;
    overflow-y: auto;
  }

  .sr-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: var(--highlight); }

  .sr-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .sr-name { font-size: 13px; color: var(--text); }
  .sr-no-result { padding: 16px; color: var(--text-muted); font-size: 13px; text-align: center; }

  /* ── LAYOUT ── */
  .app { display: flex; height: calc(100vh - 65px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    padding: 0 16px 8px;
    text-transform: uppercase;
  }

  .rack-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background .15s;
    border-left: 3px solid transparent;
  }

  .rack-btn:hover { background: var(--highlight); }
  .rack-btn.active { background: var(--highlight); border-left-color: var(--accent); color: var(--accent); }

  .rack-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    min-width: 20px;
    background: var(--rack-filled);
    border-radius: 4px;
    padding: 1px 6px;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  .section-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
  }

  /* ── FLOOR MAP ── */
  .map-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 28px;
    overflow-x: auto;
    box-shadow: 0 2px 12px rgba(10,110,95,0.06);
  }

  .map-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .floor-grid {
    display: grid;
    gap: 6px;
  }

  .zone-row {
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }

  .rack-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .rack-label-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
    background: var(--accent);
    border: 1px solid var(--accent2);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
    min-width: 36px;
  }
  .rack-label-btn:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    transform: translateY(-1px);
  }

  .cell {
    background: var(--rack-empty);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-width: 90px;
    min-height: 48px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 11px;
    line-height: 1.4;
    color: var(--text-muted);
    transition: all .2s;
    position: relative;
  }

  .cell.has-items {
    background: var(--rack-filled);
    border-color: var(--rack-filled-border);
    color: var(--text);
  }

  .cell:hover {
    background: var(--rack-hover);
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(14,140,120,0.15);
  }

  .cell.highlighted {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 2px var(--accent), 0 0 20px rgba(14,140,120,0.3);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(14,140,120,0.2); }
    50% { box-shadow: 0 0 0 3px var(--accent), 0 0 28px rgba(14,140,120,0.4); }
  }

  .cell-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    display: block;
    margin-bottom: 3px;
  }

  .special-zone {
    background: #e2eeec;
    border: 1px solid #b2d8d2;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7aada6;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(10,110,95,0.15);
    transform: translateY(20px);
    transition: transform .25s;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .modal-type { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); background: #cce8e4; }

  .photo-placeholder {
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 12px;
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    gap: 10px;
    color: var(--text-muted);
    position: relative;
    overflow: hidden;
  }

  .photo-placeholder .ph-icon { font-size: 40px; opacity: 0.4; }
  .photo-placeholder .ph-label { font-size: 13px; }
  .photo-placeholder .ph-sub { font-size: 11px; color: #555; }

  .photo-upload-hint {
    font-size: 11px;
    color: var(--accent);
    opacity: 0.7;
  }

  .items-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text);
  }

  .item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .empty-note {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    padding: 8px 0;
  }

  .modal-section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .rack-slots {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 16px;
  }

  .slot-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .slot-card:hover {
    border-color: var(--accent);
    background: var(--rack-filled);
  }

  .slot-card-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .slot-card-items {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .floor-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(14,140,120,0.08);
    border: 1px solid rgba(14,140,120,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .legend-box {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid;
  }

  .map-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .guide-banner {
    background: rgba(14,140,120,0.06);
    border: 1px solid rgba(14,140,120,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text);
  }

  .guide-banner strong { color: var(--accent); }

  /* Scroll */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .photo-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .add-photo-btn {
    background: none;
    border: 1px dashed var(--accent);
    color: var(--accent);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .add-photo-btn:hover { background: var(--highlight); }
</style>
</head>
<body>

<header>
  <div class="logo">B1<span>倉庫</span></div>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search-input" placeholder="搜尋商品名稱，例如：拉鍊箱、按摩槍…" autocomplete="off">
    <div id="search-results"></div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-title">層架列表</div>
    <div id="sidebar-racks"></div>
  </aside>

  <main id="main-content">

    <div class="guide-banner">
      💡 點擊<strong>層架代號</strong>查看整體照片，點擊<strong>格子</strong>查看該位置的詳細內容，使用<strong>搜尋</strong>快速定位商品。
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:var(--rack-filled);border-color:var(--rack-filled-border);"></div> 有商品</div>
      <div class="legend-item"><div class="legend-box" style="background:var(--rack-empty);border-color:var(--border);"></div> 空格</div>
      <div class="legend-item"><div class="legend-box" style="background:rgba(14,140,120,0.2);border-color:var(--accent);"></div> 搜尋結果</div>
    </div>
    <div class="map-container">
      <div class="map-title">📦 B1 倉庫</div>
      <div id="floor-map"></div>
      <div class="map-note">層架說明：A–D（左側）｜E–G（中左）｜H–L（中央）｜M–S（右下）｜U–W（右牆）</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

function renderRackGroup(racks, rows) {
  return `<div style="display:flex; gap:6px;">
    ${racks.map(r => `
      <div style="display:flex; flex-direction:column; gap:4px;">
        <button class="rack-label-btn" onclick="showRackOverview('${r}')">${r}</button>

          const id = `${r}-${row}`;
          const data = warehouseData[id];
          const hasItems = data && data.items.length > 0;
          return `<div class="cell ${hasItems ? 'has-items' : ''}" data-id="${id}" onclick="showCell('${id}')">
            <span class="cell-id">${id}</span>
            ${data ? data.items.slice(0,2).map(i => `<div>${i.length > 9 ? i.slice(0,9)+'…' : i}</div>`).join('') : ''}
            ${data && data.items.length > 2 ? `<div style="color:var(--accent);font-size:10px;">+${data.items.length-2}項</div>` : ''}
          </div>`;
        }).join('')}
      </div>`
    ).join('')}
  </div>`;
}

function renderSpecialCell(id, displayId, w, h, overrideText) {
  const data = warehouseData[id];
  const hasItems = data && data.items.length > 0;
  const text = overrideText || (data ? data.items.slice(0,2).join('、') : '');
  return `<div class="cell ${hasItems ? 'has-items' : ''}" data-id="${id}" onclick="showCell('${id}')" style="min-width:${w}px; min-height:${h}px;">
    <span class="cell-id">${displayId}</span>
    <div style="font-size:10px;">${text.length > 14 ? text.slice(0,14)+'…' : text}</div>
  </div>`;
}

function showCell(id) {
  const data = warehouseData[id] || { items: [] };
  const rack = id.split('-')[0];

  const content = `
    <div class="modal-header">

}

function showRackOverview(rack) {
  // Highlight in sidebar
  document.querySelectorAll('.rack-btn').forEach(b => b.classList.remove('active'));

  if (btn) btn.classList.add('active');

  const slots = Object.entries(warehouseData).filter(([k]) => k.startsWith(rack + '-'));
  const totalItems = slots.reduce((s, [, v]) => s + v.items.length, 0);

  const content = `
    <div class="modal-header">
      <div>
        <div class="modal-id">層架 ${rack}</div>
        <div class="modal-type">共 ${slots.length} 個位置 · ${totalItems} 項商品</div>

            }

    </div>
  `;
  openModal(content);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {

});

// ═══════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearHighlights();

  if (!q) { searchResults.style.display = 'none'; return; }

  const matches = searchIndex.filter(({ item }) =>
    item.includes(q)
  );

  if (matches.length === 0) {
    searchResults.innerHTML = `<div class="sr-no-result">找不到「${q}」相關商品</div>`;
  } else {
    // Deduplicate by cellId
    const seen = new Set();
    const deduped = matches.filter(m => { if (seen.has(m.cellId)) return false; seen.add(m.cellId); return true; });

    searchResults.innerHTML = deduped.map(m => `
      <div class="sr-item" onclick="highlightAndGo('${m.cellId}', '${q}')">
        <span class="sr-badge">${m.cellId}</span>
        <span class="sr-name">${m.item.replace(q, `<mark style="background:rgba(14,140,120,0.2);color:var(--accent);border-radius:3px;">${q}</mark>`)}</span>
      </div>
    `).join('');
  }
  searchResults.style.display = 'block';
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResults.style.display = 'none'; searchInput.value = ''; clearHighlights(); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.style.display = 'none';
});

function highlightAndGo(cellId, query) {
  searchResults.style.display = 'none';
  clearHighlights();

  // highlight cell
  const cell = document.querySelector(`[data-id="${cellId}"]`);
  if (cell) {
    cell.classList.add('highlighted');
    cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => showCell(cellId), 400);
  } else {
    // Cell not visible on map - show modal anyway
    showCell(cellId);
  }
}

function clearHighlights() {
  document.querySelectorAll('.cell.highlighted').forEach(c => c.classList.remove('highlighted'));
}
